services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ${API_IMAGE_NAME:-2fa-cx-api:latest}
    container_name: ${API_CONTAINER_NAME:-2fa-cx-api}
    restart: unless-stopped
    expose:
      - "3001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-2fa-cx:latest}
    container_name: ${CONTAINER_NAME:-2fa-cx}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_BIND_PORT:-18180}:80"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
